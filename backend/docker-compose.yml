version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: goodroads-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: goodroads
      POSTGRES_PASSWORD: goodroads
      POSTGRES_DB: goodroads
    ports:
      - "5432:5432"
    volumes:
      - goodroads_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goodroads -d goodroads"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  goodroads_pgdata:
