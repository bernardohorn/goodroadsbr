name: goodroads_desktop
description: "GoodRoads - aplicativo do funcionario da prefeitura (Windows)."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  flutter_localizations:
    sdk: flutter

  # Estado e injecao de dependencia (ver docs/ARQUITETURA_GOODROADS.md, secao 7.3)
  flutter_riverpod: ^2.6.1

  # Rede
  dio: ^5.7.0

  # Navegacao
  go_router: ^14.6.2

  # Armazenamento seguro de tokens (Credential Manager no Windows) e preferencias simples
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # Mapas — exclusivamente OpenStreetMap (ver secao 6 da arquitetura)
  flutter_map: ^7.0.2
  flutter_map_marker_cluster: ^1.3.6
  latlong2: ^0.9.1

  # Graficos do Dashboard
  fl_chart: ^0.69.0

  # Dialogo nativo "Salvar como" para exportacao de relatorios (Etapa 4)
  file_selector: ^1.0.3

  # Utilitarios
  intl: ^0.20.2
  equatable: ^2.0.7
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  flutter_secure_storage_platform_interface: ^1.1.2

flutter:
  uses-material-design: true
