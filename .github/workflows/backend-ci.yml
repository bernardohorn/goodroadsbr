name: Backend CI

# Etapa 6 (docs/ARQUITETURA_GOODROADS.md, secao 10). Roda a cada push/PR que
# toca backend/, com um Postgres+PostGIS real como service container — os
# testes e2e (tests/e2e/) dependem disso, ao contrario dos unitarios
# (tests/*.test.ts), que usam repository mockado e nao precisam de banco.
#
# Este workflow nunca foi executado de verdade (o sandbox onde ele foi
# escrito nao tem acesso ao GitHub Actions) — revisado estaticamente contra
# a documentacao das actions usadas. Rode o primeiro push/PR com atencao.

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

defaults:
  run:
    working-directory: backend

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: goodroads
          POSTGRES_PASSWORD: goodroads
          POSTGRES_DB: goodroads_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U goodroads -d goodroads_e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://goodroads:goodroads@localhost:5432/goodroads_e2e?schema=public
      DATABASE_URL_E2E: postgresql://goodroads:goodroads@localhost:5432/goodroads_e2e?schema=public

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Gerar chaves JWT de desenvolvimento (CI)
        run: npm run keys:generate

      - name: Gerar Prisma Client
        run: npm run prisma:generate

      - name: Aplicar migrations no banco de CI
        run: npx prisma migrate deploy

      - name: Habilitar PostGIS + trigger de sincronizacao
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          # psql nao entende o parametro ?schema= do Prisma, por isso removemos antes de usar
          psql "${DATABASE_URL%%\?*}" -f prisma/sql/postgis.sql
        shell: bash

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Testes unitarios
        run: npm test

      - name: Testes end-to-end
        run: npm run test:e2e

      - name: Build (tsc)
        run: npm run build

      - name: Build da imagem Docker
        run: docker build -t goodroads-api:ci .

      # Smoke test da imagem de producao: sobe o container de verdade contra
      # um banco VAZIO (goodroads_docker) para provar que o docker-entrypoint.sh
      # aplica as migrations sozinho, e que /health, /health/ready (checa o
      # Postgres) e /metrics respondem. Complementa o build acima, que so
      # garante que a imagem compila, nao que ela roda.
      - name: Criar banco vazio para o smoke test do container
        env:
          PGPASSWORD: goodroads
        run: psql -h localhost -U goodroads -d postgres -c "CREATE DATABASE goodroads_docker;"

      - name: Subir o container da imagem
        run: |
          docker run -d --name goodroads-api-ci \
            --network host \
            -e NODE_ENV=production \
            -e DATABASE_URL="postgresql://goodroads:goodroads@localhost:5432/goodroads_docker?schema=public" \
            goodroads-api:ci

      - name: Esperar o /health e validar /health/ready e /metrics
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3333/health > /dev/null 2>&1; then
              echo "API respondeu em /health (tentativa $i)"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::API nao respondeu em /health apos 60s"
              docker logs goodroads-api-ci || true
              exit 1
            fi
            sleep 2
          done

          echo "== /health =="
          curl -fsS http://localhost:3333/health
          echo
          echo "== /health/ready =="
          curl -fsS http://localhost:3333/health/ready | grep -q '"status":"ready"'
          echo "readiness OK (Postgres alcancavel a partir do container)"
          echo "== /metrics =="
          curl -fsS http://localhost:3333/metrics | grep -q '^process_cpu_user_seconds_total'
          echo "metrics OK (formato Prometheus)"

      - name: Confirmar que o entrypoint aplicou as migrations sozinho
        env:
          PGPASSWORD: goodroads
        run: |
          docker logs goodroads-api-ci 2>&1 | grep -q "Aplicando migrations pendentes" \
            || { echo "::error::entrypoint nao rodou migrate deploy"; exit 1; }
          # O banco comecou vazio; se o entrypoint aplicou as migrations, a
          # tabela _prisma_migrations e as tabelas do schema devem existir.
          COUNT=$(psql -h localhost -U goodroads -d goodroads_docker -tAc \
            "SELECT count(*) FROM information_schema.tables WHERE table_schema='public' AND table_name IN ('users','occurrences','_prisma_migrations');")
          echo "Tabelas-chave encontradas: $COUNT/3"
          [ "$COUNT" = "3" ] || { echo "::error::migrations nao aplicadas no banco vazio"; exit 1; }

      - name: Logs do container e limpeza
        if: always()
        run: |
          echo "== docker logs goodroads-api-ci =="
          docker logs goodroads-api-ci || true
          docker rm -f goodroads-api-ci || true
